name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clone world fixture
        run: git clone --depth 1 https://github.com/${{ github.repository_owner }}/vivarium-world.git ../the-world
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run knip
      - run: bun run public-release:scan
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: bun run format:check
      - uses: changesets/action@v1
        with:
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ github.token }}
