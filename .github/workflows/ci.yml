name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Clone world fixture
        run: git clone --depth 1 https://github.com/${{ github.repository_owner }}/vivarium-world.git ../the-world
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run knip
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: bun run format:check
